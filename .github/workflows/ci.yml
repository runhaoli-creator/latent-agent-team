name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint tooling
        run: |
          python -m pip install -U pip
          pip install ruff==0.6.9

      - name: Ruff (syntax + undefined names)
        run: ruff check --select E9,F63,F7,F82 --no-cache src serve scripts

      - name: Ruff (full, non-blocking style report)
        run: ruff check --statistics --exit-zero src serve scripts

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install light deps
        run: |
          python -m pip install -U pip
          pip install fastapi pydantic pyyaml httpx

      - name: Parse every backbone config
        run: |
          python - <<'PY'
          import glob, yaml
          for path in glob.glob("configs/*.yaml"):
              with open(path) as fh:
                  yaml.safe_load(fh)
              print(f"ok: {path}")
          PY

      - name: Import smoke test (serve package)
        run: python -c "import importlib; importlib.import_module('serve.schemas'); print('serve.schemas OK')"
