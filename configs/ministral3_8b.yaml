# Ministral 3 8B — replaces legacy Mistral 7B (marked retired in Mistral docs)
# Mistral's official docs: Mistral 7B is retired; Ministral 3B/8B are the replacements.
backbone:
  name: ministral_8b
  hf_id: mistralai/Ministral-8B-Instruct-2410
  hidden_size: 4096
  num_layers: 36
  quantization: "4bit"
  dtype: bfloat16
  max_seq_len: 32768   # Ministral supports long context
  use_flash_attention: true
  gradient_checkpointing: true
  device_map: "auto"

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

communication:
  mode: "continuous"
  latent_dim: 256
  k_initial: 8
  codebook_size: 512
  commitment_cost: 0.25
  ema_decay: 0.99
  use_gumbel_warmup: true
  injection_mode: "prefix"

bitrate_scheduler:
  hidden_dim: 64
  entropy_threshold_low: 0.3
  entropy_threshold_high: 0.7
  k_choices: [4, 8, 16, 32, 64]
  lambda_bitrate: 0.01

sparse_router:
  router_hidden_dim: 128
  routing_threshold: 0.5
  min_recipients: 1

audit_decoder:
  decoder_dim: 256
  max_decode_len: 32
  num_decoder_layers: 2

sft:
  num_epochs: 3
  batch_size: 2
  gradient_accumulation_steps: 16
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_steps: 150
  max_grad_norm: 1.0
  loss_weights:
    next_action_ce: 1.0
    constraint_recon: 0.3
    audit_decode: 0.1
    routing_supervision: 0.2
    bitrate_reg: 0.01
    vq_commitment: 1.0

dpo:
  num_epochs: 1
  batch_size: 1
  gradient_accumulation_steps: 32
  learning_rate: 2.0e-5
  beta: 0.1
  bandwidth_weight: 0.01

eval:
  max_tasks_per_benchmark: 100
  benchmarks:
    - mind2web
    - webshop
    - agentbench

wandb:
  project: latent_agent_team
  tags:
    - ministral_8b
    - latent_comm
    - replaces_mistral7b
